<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kamiu 助手测试</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
      color: #333;
    }
    h1 {
      margin: 0;
      padding: 12px 16px;
      font-size: 1.1rem;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      color: #333;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #e3f2fd;
      border: 1px solid #bbdefb;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    .msg .reasoning-wrap {
      margin-bottom: 10px;
      padding: 8px 10px;
      background: #f8f9fa;
      border-left: 3px solid #90a4ae;
      border-radius: 4px;
      font-size: 0.9rem;
      color: #546e7a;
      font-style: italic;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg .reasoning-label {
      display: block;
      font-size: 0.75rem;
      font-style: normal;
      color: #78909c;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .msg .reply-wrap {
      margin-top: 4px;
    }
    .msg .reply-label {
      display: block;
      font-size: 0.75rem;
      color: #455a64;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .msg .role {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 4px;
    }
    #form {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }
    #input {
      flex: 1;
      min-width: 0;
      max-width: 420px;
      min-height: 72px;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      color: #333;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
    }
    #input:focus {
      outline: none;
      border-color: #1976d2;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #1976d2;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1565c0; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .opts {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      font-size: 0.9rem;
      color: #555;
    }
    .opts label { cursor: pointer; }
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .loading { opacity: 0.7; }
  </style>
</head>
<body>
  <h1>Kamiu 助手 · 多轮对话测试（流式）</h1>
  <div id="messages"></div>
  <div class="opts">
    <label><input type="checkbox" id="enableThinking" /> 思考模式（返回 reasoning）</label>
  </div>
  <form id="form">
    <textarea id="input" rows="3" placeholder="输入消息，多轮对话会带上历史..." autocomplete="off"></textarea>
    <button type="submit" id="sendBtn">发送</button>
  </form>

  <script>
    const messagesEl = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const enableThinkingEl = document.getElementById('enableThinking');

    let messages = [];

    function escapeHtml(text) {
      const p = document.createElement('p');
      p.textContent = text;
      return p.innerHTML;
    }

    function appendMessage(role, content, reasoning) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const roleLabel = role === 'user' ? '我' : '助手';
      let html = '<span class="role">' + roleLabel + '</span>';
      if (role === 'assistant') {
        if (reasoning) {
          html += '<div class="reasoning-wrap"><span class="reasoning-label">思考过程</span><div class="reasoning-content">' + escapeHtml(reasoning) + '</div></div>';
        }
        html += '<div class="reply-wrap"><span class="reply-label">回复</span><span class="content">' + escapeHtml(content) + '</span></div>';
      } else {
        html += escapeHtml(content);
      }
      div.innerHTML = html;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function createStreamingAssistantMessage() {
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.innerHTML = '<span class="role">助手</span><div class="reasoning-wrap" style="display:none;"><span class="reasoning-label">思考过程</span><div class="reasoning-content"></div></div><div class="reply-wrap"><span class="reply-label">回复</span><span class="content"></span></div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return {
        el: div,
        contentEl: div.querySelector('.content'),
        reasoningWrap: div.querySelector('.reasoning-wrap'),
        reasoningContent: div.querySelector('.reasoning-content'),
      };
    }

    function setLoading(loading) {
      sendBtn.disabled = loading;
      sendBtn.textContent = loading ? '...' : '发送';
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = (input.value || '').trim();
      if (!text) return;

      input.value = '';
      appendMessage('user', text);
      messages.push({ role: 'user', content: text });

      setLoading(true);
      const history = messages.slice(0, -1).map(m => ({ content: m.content }));

      const streaming = createStreamingAssistantMessage();
      let fullContent = '';
      let fullReasoning = '';

      try {
        const res = await fetch('/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            history,
            enable_thinking: enableThinkingEl.checked || undefined,
          }),
        });

        if (!res.ok) {
          const errText = await res.text();
          streaming.contentEl.textContent = '请求失败：' + (errText || res.status);
          messages.push({ role: 'assistant', content: streaming.contentEl.textContent });
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let seenDone = false;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const data = line.slice(5).trim();
            if (!data || data === '[DONE]') continue;
            try {
              const obj = JSON.parse(data);
              const t = obj.type;
              if (t === 'reasoning' && obj.content != null) {
                fullReasoning += obj.content;
                streaming.reasoningWrap.style.display = 'block';
                streaming.reasoningContent.textContent = fullReasoning;
                messagesEl.scrollTop = messagesEl.scrollHeight;
              } else if (t === 'content' && obj.content != null) {
                fullContent += obj.content;
                streaming.contentEl.textContent = fullContent;
                messagesEl.scrollTop = messagesEl.scrollHeight;
              } else if (t === 'done') {
                seenDone = true;
                break;
              }
            } catch (_) {}
          }
          if (seenDone) break;
        }

        if (fullReasoning) {
          streaming.reasoningWrap.style.display = 'block';
          streaming.reasoningContent.textContent = fullReasoning;
        }
        messagesEl.scrollTop = messagesEl.scrollHeight;

        messages.push({ role: 'assistant', content: fullContent, reasoning: fullReasoning || null });
      } catch (err) {
        streaming.contentEl.textContent = '网络错误：' + err.message;
        messages.push({ role: 'assistant', content: '网络错误：' + err.message });
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
